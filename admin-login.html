<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - Edifique Construcoes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: 'DM Sans', sans-serif;
      background:
        linear-gradient(150deg, rgba(7,16,20,.92), rgba(7,16,20,.98)),
        radial-gradient(circle at 70% 20%, rgba(214,200,173,.16), transparent 36%);
      color: #e7ecec;
    }
    .admin-login-card {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      background: #0f1e25;
      border: 1px solid rgba(214,200,173,.24);
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
    }
    .kicker {
      display: block;
      margin-bottom: .35rem;
      color: #d6c8ad;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    h1 { margin: 0 0 .55rem; color: #e7ecec; font-size: 1.75rem; line-height: 1.15; }
    p { margin: 0 0 1.6rem; color: rgba(231,236,236,.68); font-size: .92rem; line-height: 1.55; }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      margin-bottom: .45rem;
      color: rgba(231,236,236,.74);
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      min-height: 46px;
      padding: .78rem .9rem;
      border: 1px solid rgba(231,236,236,.13);
      border-radius: 6px;
      background: #071014;
      color: #e7ecec;
      font: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus { border-color: rgba(214,200,173,.72); box-shadow: 0 0 0 3px rgba(214,200,173,.1); }
    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: #d6c8ad;
      color: #071014;
      font: inherit;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .2s;
    }
    button:hover { background: #c08e62; transform: translateY(-1px); }
    button:disabled { opacity: .65; cursor: wait; transform: none; }
    .login-error {
      display: block;
      min-height: 1.15rem;
      margin-bottom: .85rem;
      color: #ff8a78;
      font-size: .84rem;
    }
    .back-link {
      display: inline-flex;
      margin-top: 1rem;
      color: rgba(231,236,236,.62);
      font-size: .86rem;
      text-decoration: none;
    }
    .back-link:hover { color: #d6c8ad; }
  </style>
</head>
<body>
  <main class="admin-login-card">
    <span class="kicker">Acesso restrito</span>
    <h1>Login do administrador</h1>
    <p>Entre com seu nome autorizado para gerenciar avaliacoes, obras e fotos do site.</p>

    <form id="adminLoginForm" novalidate>
      <div class="form-group">
        <label for="adminName">Nome</label>
        <select id="adminName" autocomplete="username" required>
          <option value="">Selecione seu nome</option>
          <option value="Anderson">Anderson</option>
          <option value="Ana">Ana</option>
          <option value="Ariel">Ariel</option>
        </select>
      </div>
      <div class="form-group">
        <label for="adminPassword">Senha</label>
        <input type="password" id="adminPassword" placeholder="Sua senha" autocomplete="current-password" required>
      </div>
      <span class="login-error" id="adminLoginError"></span>
      <button type="submit" id="adminLoginButton">Entrar no painel</button>
    </form>

    <a class="back-link" href="index.html">Voltar ao site principal</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://uimjqymytxqvvwrojcgg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_k-VnTcGnw9yTPXteKozg3w_z4fi_uf8";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = "admin@edifique.com";
    const ADMIN_NAMES = ["anderson", "ana", "ariel"];

    window.addEventListener("load", async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data?.session?.user?.email === ADMIN_EMAIL) {
        window.location.replace("admin.html");
      }
    });

    document.getElementById("adminLoginForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = document.getElementById("adminName").value.trim().toLowerCase();
      const password = document.getElementById("adminPassword").value;
      const errorBox = document.getElementById("adminLoginError");
      const button = document.getElementById("adminLoginButton");
      errorBox.textContent = "";

      if (!name || !password) {
        errorBox.textContent = "Informe nome e senha.";
        return;
      }

      if (!ADMIN_NAMES.includes(name)) {
        errorBox.textContent = "Nome sem acesso ao painel admin.";
        return;
      }

      button.disabled = true;
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email: ADMIN_EMAIL, password });
        if (error) {
          errorBox.textContent = "Nome ou senha invalidos.";
          return;
        }

        if (data.user.email !== ADMIN_EMAIL) {
          await supabaseClient.auth.signOut();
          errorBox.textContent = "Esta conta nao tem acesso ao painel admin.";
          return;
        }

        window.location.replace("admin.html");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
