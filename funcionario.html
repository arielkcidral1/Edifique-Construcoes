<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso ao Sistema - Edifique Construções</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #141210;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #1e1c1a;
      padding: 2rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h2 { text-align: center; color: #d4af37; margin-top: 0; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
    input, select, textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #333;
      background: #141210;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 1rem;
      background-color: #d4af37;
      color: #141210;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background-color: #bfa030; }
    .hidden { display: none; }
    .alert { padding: 1rem; border-radius: 4px; margin-bottom: 1rem; text-align: center; }
    .alert-success { background: #28a745; color: #fff; }
    .alert-error { background: #dc3545; color: #fff; }
  </style>
</head>
<body>

  <div class="container">
    <div id="messageBox" class="alert hidden"></div>

    <!-- Form de Login -->
    <div id="loginSection">
      <h2>Acesso ao Sistema</h2>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Seu e-mail" required />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Sua senha" required />
      </div>
      <button onclick="realizarLogin()">Entrar</button>
      <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
        Não tem uma conta? <a href="cadastro.html" style="color: #d4af37; text-decoration: none; font-weight: bold;">Cadastre-se</a>
      </p>
    </div>

    <!-- Form de Avaliação -->
    <div id="reviewSection" class="hidden">
      <h2>Avaliar a Empresa</h2>
      <div class="form-group">
        <label for="rating">Nota (1 a 5)</label>
        <select id="rating">
          <option value="5">5 - Excelente</option>
          <option value="4">4 - Muito Bom</option>
          <option value="3">3 - Bom</option>
          <option value="2">2 - Ruim</option>
          <option value="1">1 - Péssimo</option>
        </select>
      </div>
      <div class="form-group">
        <label for="comment">Comentário / Depoimento</label>
        <textarea id="comment" rows="4" placeholder="Escreva sua avaliação..."></textarea>
      </div>
      <button onclick="enviarAvaliacao()">Enviar Avaliação</button>
      <button onclick="sair()" style="margin-top: 10px; background: transparent; border: 1px solid #d4af37; color: #d4af37;">Sair</button>
    </div>
  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://uimjqymytxqvvwrojcgg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_k-VnTcGnw9yTPXteKozg3w_z4fi_uf8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Verificar se já está logado ao carregar a página
    window.addEventListener('load', async () => {
      const { data } = await supabase.auth.getSession();
      if (data?.session) {
        const email = data.session.user.email;
        if (email === 'admin@edifique.com') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }
    });

    function showMessage(msg, isError = false) {
      const msgBox = document.getElementById('messageBox');
      msgBox.textContent = msg;
      msgBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
      msgBox.classList.remove('hidden');
      setTimeout(() => msgBox.classList.add('hidden'), 4000);
    }

    async function realizarLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      
      if (error) {
        showMessage("Erro no login: " + error.message, true);
      } else {
        const userEmail = data.user.email;
        if (userEmail === 'admin@edifique.com') {
          window.location.href = 'admin.html'; // Redireciona para o painel se for Admin
        } else {
          window.location.href = 'index.html'; // Redireciona para o site principal
        }
      }
    }

    async function enviarAvaliacao() {
      const rating = document.getElementById('rating').value;
      const comment = document.getElementById('comment').value;

      const { data, error } = await supabase.from('reviews').insert([
        { rating: parseInt(rating), comment: comment }
      ]);

      if (error) {
        showMessage("Erro ao enviar: " + error.message, true);
      } else {
        showMessage("Avaliação enviada com sucesso!");
        document.getElementById('comment').value = "";
      }
    }

    async function sair() {
      await supabase.auth.signOut();
      location.reload();
    }
    
  </script>
</body>
</html>
